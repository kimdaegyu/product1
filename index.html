
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lotto Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button class="theme-toggle" id="theme-toggle" title="Toggle Theme">🌓</button>
        <h1>Lotto Number Generator</h1>
        <div class="numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate">Generate Numbers</button>
    </div>

    <div class="container contact-container">
        <h2>제휴 문의</h2>
        <form action="https://formspree.io/f/xrergbgy" method="POST">
            <div class="form-group">
                <input type="text" name="name" placeholder="성함 / 업체명" required>
            </div>
            <div class="form-group">
                <input type="email" name="_replyto" placeholder="이메일 주소" required>
            </div>
            <div class="form-group">
                <textarea name="message" placeholder="문의 내용을 입력해주세요" rows="4" required></textarea>
            </div>
            <button type="submit" id="submit-btn">문의 보내기</button>
        </form>
    </div>

    <script src="main.js"></script>
</body>
</html>
